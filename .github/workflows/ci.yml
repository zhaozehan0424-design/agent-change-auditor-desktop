name: CI

on:
  push:
  pull_request:

jobs:
  desktop-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check PowerShell desktop wrapper
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\check-desktop.ps1 -SkipAca
